<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="95%">
      <stop offset="0%" stop-color="#173A84"/>
      <stop offset="42%" stop-color="#08152C"/>
      <stop offset="100%" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2F80FF"/>
      <stop offset="0.52" stop-color="#7C4DFF"/>
      <stop offset="1" stop-color="#FF4FD8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFD36B"/>
      <stop offset="1" stop-color="#B87818"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10264D"/>
      <stop offset="1" stop-color="#0A1228"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="40" flood-color="#00091D" flood-opacity="0.72"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#7C4DFF" flood-opacity="0.52"/>
    </filter>
    <style>
      .font{font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif}
      .white{fill:#F8FAFF}
      .muted{fill:#A9B8D8}
      .subtle{fill:#7585AA}
      .green{fill:#16D68A}
      .cyan{fill:#21F5D0}
      .heavy{font-weight:850}
      .bold{font-weight:760}
      .medium{font-weight:620}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1260" cy="160" r="330" fill="#2F80FF" opacity="0.13"/>
  <circle cx="320" cy="850" r="360" fill="#FF4FD8" opacity="0.08"/>
  <rect x="54" y="46" width="1492" height="908" rx="44" fill="#071126" fill-opacity="0.87" stroke="#2A4778" stroke-width="2" filter="url(#shadow)"/>

  <g transform="translate(106 92)">
    <rect x="0" y="0" width="198" height="66" rx="23" fill="#0D1A35" stroke="#2C4976"/>
    <circle cx="36" cy="33" r="18" fill="url(#cta)"/>
    <text x="68" y="42" class="font white bold" font-size="25">AllocaFi</text>
  </g>

  <g transform="translate(170 196)">
    <text x="0" y="0" class="font white heavy" font-size="66">Choose your plan</text>
    <text x="0" y="58" class="font muted medium" font-size="26">Your selected template is ready. Choose how much of it you want unlocked.</text>
  </g>

  <g transform="translate(170 305)">
    <rect x="0" y="0" width="560" height="430" rx="38" fill="#08172F" stroke="#294A78" stroke-width="2"/>
    <rect x="32" y="32" width="112" height="42" rx="21" fill="#10264D" stroke="#315983"/>
    <text x="58" y="60" class="font white bold" font-size="18">FREE</text>
    <text x="32" y="132" class="font white heavy" font-size="44">Free</text>
    <text x="32" y="178" class="font muted medium" font-size="22">Start with the core version of your selected template.</text>

    <g transform="translate(32 224)">
      <circle cx="12" cy="12" r="9" fill="#16D68A"/>
      <text x="36" y="19" class="font white bold" font-size="21">3 core budget accounts</text>
    </g>
    <g transform="translate(32 270)">
      <circle cx="12" cy="12" r="9" fill="#16D68A"/>
      <text x="36" y="19" class="font white bold" font-size="21">Stablecoin owner wallet</text>
    </g>
    <g transform="translate(32 316)">
      <circle cx="12" cy="12" r="9" fill="#16D68A"/>
      <text x="36" y="19" class="font white bold" font-size="21">Vault activation</text>
    </g>

    <rect x="32" y="356" width="496" height="56" rx="22" fill="#0D1A35" stroke="#2D496F"/>
    <text x="168" y="392" class="font white bold" font-size="20">Continue Free</text>
  </g>

  <g transform="translate(782 280)">
    <rect x="0" y="0" width="648" height="480" rx="42" fill="url(#card)" stroke="#FF4FD8" stroke-width="2.5" filter="url(#glow)"/>
    <rect x="34" y="34" width="248" height="44" rx="22" fill="#311344" stroke="#FF4FD8"/>
    <text x="58" y="63" class="font white bold" font-size="18">RECOMMENDED CORE</text>

    <text x="34" y="142" class="font white heavy" font-size="44">AllocaFi Core + Legal Core</text>
    <text x="34" y="190" class="font muted medium" font-size="23">$7.99 / month. Unlock the full template and reserve asset tracking.</text>

    <g transform="translate(34 238)">
      <circle cx="12" cy="12" r="9" fill="#21F5D0"/>
      <text x="36" y="19" class="font white bold" font-size="21">Unlimited budget accounts from template</text>
    </g>
    <g transform="translate(34 284)">
      <circle cx="12" cy="12" r="9" fill="#21F5D0"/>
      <text x="36" y="19" class="font white bold" font-size="21">Legal Core tracker for reserve assets</text>
    </g>
    <g transform="translate(34 330)">
      <circle cx="12" cy="12" r="9" fill="#21F5D0"/>
      <text x="36" y="19" class="font white bold" font-size="21">Asset reserve wallets after activation</text>
    </g>
    <g transform="translate(34 376)">
      <circle cx="12" cy="12" r="9" fill="#21F5D0"/>
      <text x="36" y="19" class="font white bold" font-size="21">Vault-protected dashboard recovery</text>
    </g>

    <rect x="34" y="414" width="580" height="58" rx="23" fill="url(#cta)"/>
    <text x="228" y="451" class="font white heavy" font-size="21">Choose Core</text>
  </g>

  <g transform="translate(170 782)">
    <rect x="0" y="0" width="1260" height="56" rx="22" fill="#081831" stroke="#1B3D68"/>
    <text x="30" y="36" class="font muted medium" font-size="19">Selected template: Essential Budget. Free applies the 3 core accounts. Core keeps the complete template.</text>
  </g>

  <g transform="translate(96 870)">
    <rect x="0" y="0" width="1048" height="42" rx="21" fill="#081831" stroke="#1B3D68"/>
    <text x="28" y="28" class="font muted medium" font-size="18">Next: add stablecoin owner wallet.</text>
  </g>

  <g transform="translate(1172 870)">
    <rect x="0" y="0" width="332" height="42" rx="21" fill="#081A36" stroke="#294A78"/>
    <text x="22" y="28" class="font white bold" font-size="16">Setup Progress</text>
    <circle cx="180" cy="21" r="7" fill="#1A2B4F" stroke="#334C76"/>
    <circle cx="210" cy="21" r="7" fill="#1A2B4F" stroke="#334C76"/>
    <circle cx="240" cy="21" r="8" fill="url(#cta)"/>
    <circle cx="270" cy="21" r="7" fill="#1A2B4F" stroke="#334C76"/>
    <circle cx="300" cy="21" r="7" fill="#1A2B4F" stroke="#334C76"/>
  </g>
</svg>
