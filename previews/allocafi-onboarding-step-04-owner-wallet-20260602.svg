<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="95%">
      <stop offset="0%" stop-color="#173A84"/>
      <stop offset="42%" stop-color="#08152C"/>
      <stop offset="100%" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2F80FF"/>
      <stop offset="0.52" stop-color="#7C4DFF"/>
      <stop offset="1" stop-color="#FF4FD8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10264D"/>
      <stop offset="1" stop-color="#0A1228"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="40" flood-color="#00091D" flood-opacity="0.72"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#2F80FF" flood-opacity="0.48"/>
    </filter>
    <style>
      .font{font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif}
      .white{fill:#F8FAFF}
      .muted{fill:#A9B8D8}
      .subtle{fill:#7585AA}
      .green{fill:#16D68A}
      .cyan{fill:#21F5D0}
      .heavy{font-weight:850}
      .bold{font-weight:760}
      .medium{font-weight:620}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1260" cy="160" r="330" fill="#2F80FF" opacity="0.13"/>
  <circle cx="300" cy="850" r="360" fill="#FF4FD8" opacity="0.08"/>
  <rect x="54" y="46" width="1492" height="908" rx="44" fill="#071126" fill-opacity="0.87" stroke="#2A4778" stroke-width="2" filter="url(#shadow)"/>

  <g transform="translate(106 92)">
    <rect x="0" y="0" width="198" height="66" rx="23" fill="#0D1A35" stroke="#2C4976"/>
    <circle cx="36" cy="33" r="18" fill="url(#cta)"/>
    <text x="68" y="42" class="font white bold" font-size="25">AllocaFi</text>
  </g>

  <g transform="translate(170 190)">
    <text x="0" y="0" class="font white heavy" font-size="64">Add your Owner Wallet</text>
    <text x="0" y="58" class="font muted medium" font-size="26">Start with the stablecoin wallet that funds your budget accounts.</text>
    <text x="0" y="98" class="font muted medium" font-size="26">Reserve assets like BTC, ETH, SOL, and XRP are added later inside Core.</text>
  </g>

  <g transform="translate(170 332)">
    <rect x="0" y="0" width="760" height="408" rx="38" fill="#08172F" stroke="#2F80FF" stroke-width="2" filter="url(#glow)"/>
    <text x="36" y="58" class="font white bold" font-size="27">Stablecoin owner wallet</text>
    <text x="36" y="92" class="font muted medium" font-size="19">Only USDC, USDT, or PYUSD can be used for initial setup.</text>

    <g transform="translate(36 132)">
      <rect x="0" y="0" width="688" height="68" rx="24" fill="#061126" stroke="#25466F"/>
      <text x="24" y="42" class="font subtle medium" font-size="20">Paste wallet address</text>
      <rect x="520" y="12" width="148" height="44" rx="22" fill="#0E2142" stroke="#315983"/>
      <text x="552" y="41" class="font white bold" font-size="18">Detect</text>
    </g>

    <g transform="translate(36 228)">
      <rect x="0" y="0" width="208" height="82" rx="24" fill="#0D1A35" stroke="#21F5D0"/>
      <circle cx="42" cy="41" r="20" fill="#2775CA"/>
      <text x="76" y="36" class="font white bold" font-size="20">USDC</text>
      <text x="76" y="60" class="font muted medium" font-size="15">Allowed</text>
    </g>
    <g transform="translate(276 228)">
      <rect x="0" y="0" width="208" height="82" rx="24" fill="#0D1A35" stroke="#21F5D0"/>
      <circle cx="42" cy="41" r="20" fill="#26A17B"/>
      <text x="76" y="36" class="font white bold" font-size="20">USDT</text>
      <text x="76" y="60" class="font muted medium" font-size="15">Allowed</text>
    </g>
    <g transform="translate(516 228)">
      <rect x="0" y="0" width="208" height="82" rx="24" fill="#0D1A35" stroke="#21F5D0"/>
      <circle cx="42" cy="41" r="20" fill="#7C4DFF"/>
      <text x="76" y="36" class="font white bold" font-size="20">PYUSD</text>
      <text x="76" y="60" class="font muted medium" font-size="15">Allowed</text>
    </g>

    <rect x="36" y="338" width="688" height="48" rx="20" fill="#071126" stroke="#263F69"/>
    <text x="24" y="369" class="font muted medium" font-size="18">Stablecoins become Virtual Budget Accounts. Reserve assets become Asset Reserve Accounts later.</text>
  </g>

  <g transform="translate(984 332)">
    <rect x="0" y="0" width="446" height="408" rx="38" fill="#08172F" stroke="#294A78"/>
    <text x="34" y="58" class="font white bold" font-size="27">What happens next</text>

    <g transform="translate(34 108)">
      <circle cx="16" cy="16" r="16" fill="#102850" stroke="#2F80FF"/>
      <text x="10" y="23" class="font white bold" font-size="17">1</text>
      <text x="52" y="22" class="font white bold" font-size="21">Validate stablecoin wallet</text>
      <text x="52" y="52" class="font muted medium" font-size="17">Checks asset type before setup continues.</text>
    </g>

    <g transform="translate(34 188)">
      <circle cx="16" cy="16" r="16" fill="#102850" stroke="#7C4DFF"/>
      <text x="10" y="23" class="font white bold" font-size="17">2</text>
      <text x="52" y="22" class="font white bold" font-size="21">Prepare Vault signature</text>
      <text x="52" y="52" class="font muted medium" font-size="17">Signature only. No funds move.</text>
    </g>

    <g transform="translate(34 268)">
      <circle cx="16" cy="16" r="16" fill="#102850" stroke="#21F5D0"/>
      <text x="10" y="23" class="font white bold" font-size="17">3</text>
      <text x="52" y="22" class="font white bold" font-size="21">Unlock AllocaFi</text>
      <text x="52" y="52" class="font muted medium" font-size="17">Applies selected template and plan.</text>
    </g>
  </g>

  <g transform="translate(170 772)">
    <rect x="0" y="0" width="1260" height="56" rx="22" fill="#081831" stroke="#1B3D68"/>
    <text x="30" y="36" class="font muted medium" font-size="19">BTC, ETH, SOL, LTC, XRP, ADA, AVAX, HBAR, BNB, and POL are reserve assets only, not owner wallets.</text>
  </g>

  <g transform="translate(96 870)">
    <rect x="0" y="0" width="1048" height="42" rx="21" fill="#081831" stroke="#1B3D68"/>
    <text x="28" y="28" class="font muted medium" font-size="18">Next: activate Vault with signature.</text>
  </g>

  <g transform="translate(1172 870)">
    <rect x="0" y="0" width="332" height="42" rx="21" fill="#081A36" stroke="#294A78"/>
    <text x="22" y="28" class="font white bold" font-size="16">Setup Progress</text>
    <circle cx="180" cy="21" r="7" fill="#1A2B4F" stroke="#334C76"/>
    <circle cx="210" cy="21" r="7" fill="#1A2B4F" stroke="#334C76"/>
    <circle cx="240" cy="21" r="7" fill="#1A2B4F" stroke="#334C76"/>
    <circle cx="270" cy="21" r="8" fill="url(#cta)"/>
    <circle cx="300" cy="21" r="7" fill="#1A2B4F" stroke="#334C76"/>
  </g>
</svg>
